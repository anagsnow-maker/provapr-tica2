<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SkyNode Monitor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Cloud Health Monitor - SkyNode Solutions</h1>
    </header>

    <main>
        <section id="dashboard">
            <div id="card-cpu" class="card">
                <h2>CPU</h2>
                <p class="valor">0%</p>
            </div>
            <div id="card-ram" class="card">
                <h2>RAM</h2>
                <p class="valor">0 GB</p>
            </div>
            <div id="card-temp" class="card">
                <h2>Temperatura</h2>
                <p class="valor">0°C</p>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 SkyNode Solutions</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
